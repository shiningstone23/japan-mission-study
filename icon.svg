<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Green background circle -->
  <circle cx="256" cy="256" r="256" fill="#58CC02"/>
  <!-- Inner circle for depth -->
  <circle cx="256" cy="256" r="230" fill="#46A302"/>

  <!-- White cross (십자가) -->
  <rect x="234" y="100" width="44" height="312" rx="10" fill="white"/>
  <rect x="130" y="200" width="252" height="44" rx="10" fill="white"/>

  <!-- 日 character (simplified) positioned bottom-right area -->
  <!-- Outer rectangle of 日 -->
  <rect x="298" y="316" width="90" height="80" rx="6" fill="none" stroke="white" stroke-width="10"/>
  <!-- Middle line of 日 -->
  <line x1="298" y1="356" x2="388" y2="356" stroke="white" stroke-width="10"/>

  <!-- Small cross highlight -->
  <rect x="238" y="104" width="36" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
</svg>
